<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Fundo arredondado no tom do tema (funciona em abas claras e escuras). -->
  <rect width="16" height="16" rx="3" fill="#16161a"/>

  <!-- Coração de miçangas — corpo rosa pink (E4 da paleta). -->
  <g fill="#e8568a">
    <rect x="10" y="2" width="2" height="1"/>
    <rect x="5"  y="3" width="2" height="1"/>
    <rect x="9"  y="3" width="4" height="1"/>
    <rect x="3"  y="4" width="10" height="1"/>
    <rect x="3"  y="5" width="10" height="1"/>
    <rect x="3"  y="6" width="10" height="1"/>
    <rect x="4"  y="7" width="8"  height="1"/>
    <rect x="5"  y="8" width="6"  height="1"/>
    <rect x="6"  y="9" width="4"  height="1"/>
    <rect x="7"  y="10" width="2" height="1"/>
  </g>

  <!-- Brilho no lóbulo esquerdo (rosa claro E2) para dar volume de miçanga. -->
  <g fill="#f4a8c8">
    <rect x="4" y="2" width="2" height="1"/>
    <rect x="3" y="3" width="2" height="1"/>
  </g>
</svg>
